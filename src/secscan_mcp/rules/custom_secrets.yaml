# Custom secret patterns (org-specific). Matched against file contents.
rules:
  - id: internal-api-key
    title: Possible internal API key
    severity: high
    pattern: 'INTERNAL_API_KEY\s*=\s*["\x27][a-zA-Z0-9_\-]{16,}["\x27]'
    remediation: Move API keys to environment variables or a secrets manager.

  - id: hardcoded-jwt
    title: Hardcoded JWT-like token
    severity: critical
    pattern: 'eyJ[a-zA-Z0-9_-]+\.eyJ[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+'
    remediation: Never commit JWTs; use short-lived tokens from your auth provider.

  - id: generic-private-key-header
    title: Private key material in source
    severity: critical
    pattern: '-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'
    remediation: Remove private keys from the repo and rotate affected credentials.
